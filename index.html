<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: #242424;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #aaa;
      text-transform: uppercase;
    }

    #upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #upload-btn:hover { background: #2563eb; }
    #upload-btn svg { flex-shrink: 0; }

    #file-input { display: none; }

    /* ── Image list ── */
    #image-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #image-list::-webkit-scrollbar { width: 5px; }
    #image-list::-webkit-scrollbar-track { background: transparent; }
    #image-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .image-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .image-card:hover { background: #383838; border-color: #555; }
    .image-card.active { border-color: #3b82f6; background: #1e3a5f; }

    .image-card img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      overflow: hidden;
    }
    .card-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ddd;
    }
    .card-size {
      font-size: 11px;
      color: #777;
      margin-top: 2px;
    }

    .card-remove {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .card-remove:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    .empty-state {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 32px 16px;
      line-height: 1.6;
    }
    .empty-state svg { margin-bottom: 10px; opacity: 0.4; }

    /* ── Sidebar footer ── */
    #sidebar-footer {
      padding: 12px;
      border-top: 1px solid #333;
    }

    #publish-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #publish-btn:hover { background: #15803d; }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #141414;
    }

    #main-placeholder {
      text-align: center;
      color: #444;
    }
    #main-placeholder svg { margin-bottom: 16px; opacity: 0.3; }
    #main-placeholder p { font-size: 15px; }

    #main-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #main-label {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #ccc;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      display: none;
    }

    #main-img { cursor: pointer; }
    #main-img:hover { opacity: 0.9; }

    /* ── Modal overlay ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #242424;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      width: 520px;
      max-width: calc(100vw - 48px);
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #modal-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 380px;
    }
    #modal-close {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    #modal-close:hover { color: #ddd; }

    #modal-body {
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    #modal-body::-webkit-scrollbar { width: 5px; }
    #modal-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .modal-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 8px;
    }

    .modal-section textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #ddd;
      font-size: 13px;
      font-family: inherit;
      padding: 10px 12px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-section textarea:focus { border-color: #3b82f6; }

    .resize-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .resize-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }
    .resize-field span {
      font-size: 11px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .resize-field input {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #ddd;
      font-size: 13px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .resize-field input:focus { border-color: #3b82f6; }

    .resize-divider {
      color: #555;
      font-size: 18px;
      padding-top: 18px;
      flex-shrink: 0;
    }

    #resize-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-end;
      margin-top: 2px;
    }
    #resize-btn:hover { background: #2563eb; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Images</h2>
      <button id="upload-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload Images
      </button>
      <input type="file" id="file-input" accept="image/*" multiple />
    </div>

    <div id="image-list">
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>No images yet.<br/>Click Upload to add some.</p>
      </div>
    </div>
    <div id="sidebar-footer">
      <button id="publish-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9l20-7z"/>
        </svg>
        Publish
      </button>
    </div>
  </aside>

  <!-- Main viewer -->
  <main id="main">
    <div id="main-placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>Select an image to preview</p>
    </div>
    <img id="main-img" alt="Preview" />
    <span id="main-label"></span>
  </main>

  <!-- Image detail modal -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="modal-body">
        <!-- Section 1: Description -->
        <div class="modal-section">
          <label>Description</label>
          <textarea id="modal-description" placeholder="Add a description…"></textarea>
        </div>

        <!-- Section 2: Generated text -->
        <div class="modal-section">
          <label>Generated Text</label>
          <textarea id="modal-generated" placeholder="Generated text will appear here…"></textarea>
        </div>

        <!-- Section 3: Resize -->
        <div class="modal-section">
          <label>Dimensions</label>
          <div class="resize-row">
            <div class="resize-field">
              <span>Width (px)</span>
              <input type="number" id="resize-width" min="1" />
            </div>
            <div class="resize-divider">×</div>
            <div class="resize-field">
              <span>Height (px)</span>
              <input type="number" id="resize-height" min="1" />
            </div>
            <button id="resize-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <path d="M7 10l5 5 5-5"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Resize
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadBtn       = document.getElementById('upload-btn');
    const fileInput       = document.getElementById('file-input');
    const imageList       = document.getElementById('image-list');
    const emptyState      = document.getElementById('empty-state');
    const mainImg         = document.getElementById('main-img');
    const mainLabel       = document.getElementById('main-label');
    const mainPlaceholder = document.getElementById('main-placeholder');

    const modalOverlay    = document.getElementById('modal-overlay');
    const modalTitle      = document.getElementById('modal-title');
    const modalClose      = document.getElementById('modal-close');
    const modalDesc       = document.getElementById('modal-description');
    const modalGenerated  = document.getElementById('modal-generated');
    const resizeWidth     = document.getElementById('resize-width');
    const resizeHeight    = document.getElementById('resize-height');
    const resizeBtn       = document.getElementById('resize-btn');

    let images = [];   // { name, size, dataUrl, card, description, generated }
    let activeIndex = null;
    let modalIndex  = null;
    let aspectRatio = 1;  // width / height
    let changingDim = false;  // guard against recursive input events

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      files.forEach(loadFile);
      fileInput.value = '';
    });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const entry = {
            name: file.name,
            size: file.size,
            dataUrl: e.target.result,
            origW: img.naturalWidth,
            origH: img.naturalHeight,
            currentW: img.naturalWidth,
            currentH: img.naturalHeight,
            description: '',
            generated: ''
          };
          images.push(entry);
          entry.card = createCard(entry);
          imageList.appendChild(entry.card);
          emptyState.style.display = 'none';
          if (images.length === 1) selectImage(0);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function createCard(entry) {
      const card = document.createElement('div');
      card.className = 'image-card';

      const thumb = document.createElement('img');
      thumb.src = entry.dataUrl;
      thumb.alt = entry.name;

      const info = document.createElement('div');
      info.className = 'card-info';

      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = entry.name;
      name.title = entry.name;

      const size = document.createElement('div');
      size.className = 'card-size';
      size.textContent = formatSize(entry.size);

      info.appendChild(name);
      info.appendChild(size);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'card-remove';
      removeBtn.title = 'Remove';
      removeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

      card.appendChild(thumb);
      card.appendChild(info);
      card.appendChild(removeBtn);

      card.addEventListener('click', (e) => {
        if (e.target.closest('.card-remove')) return;
        selectImage(images.indexOf(entry));
      });

      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeImage(images.indexOf(entry));
      });

      return card;
    }

    function selectImage(index) {
      if (activeIndex !== null && images[activeIndex]) {
        images[activeIndex].card.classList.remove('active');
      }
      activeIndex = index;
      const entry = images[index];
      entry.card.classList.add('active');

      mainImg.src = entry.dataUrl;
      mainImg.style.display = 'block';
      mainLabel.textContent = entry.name;
      mainLabel.style.display = 'block';
      mainPlaceholder.style.display = 'none';
    }

    function removeImage(index) {
      const entry = images[index];
      entry.card.remove();
      images.splice(index, 1);

      if (images.length === 0) {
        emptyState.style.display = '';
        mainImg.style.display = 'none';
        mainLabel.style.display = 'none';
        mainPlaceholder.style.display = '';
        activeIndex = null;
      } else if (activeIndex === index) {
        const next = Math.min(index, images.length - 1);
        activeIndex = null;
        selectImage(next);
      } else if (activeIndex > index) {
        activeIndex--;
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ── Modal ──────────────────────────────────────────────
    mainImg.addEventListener('click', () => {
      if (activeIndex === null) return;
      openModal(activeIndex);
    });

    function openModal(index) {
      modalIndex = index;
      const entry = images[index];
      modalTitle.textContent = entry.name;
      modalDesc.value      = entry.description;
      modalGenerated.value = entry.generated;
      resizeWidth.value    = entry.currentW;
      resizeHeight.value   = entry.currentH;
      aspectRatio = entry.currentW / entry.currentH;
      modalOverlay.classList.add('open');
    }

    function closeModal() {
      if (modalIndex !== null) {
        // Persist textarea values back to the entry
        images[modalIndex].description = modalDesc.value;
        images[modalIndex].generated   = modalGenerated.value;
      }
      modalIndex = null;
      modalOverlay.classList.remove('open');
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ── Linked dimension inputs ────────────────────────────
    resizeWidth.addEventListener('input', () => {
      if (changingDim) return;
      changingDim = true;
      const w = parseFloat(resizeWidth.value);
      if (w > 0) resizeHeight.value = Math.round(w / aspectRatio);
      changingDim = false;
    });

    resizeHeight.addEventListener('input', () => {
      if (changingDim) return;
      changingDim = true;
      const h = parseFloat(resizeHeight.value);
      if (h > 0) resizeWidth.value = Math.round(h * aspectRatio);
      changingDim = false;
    });

    // ── Resize action ──────────────────────────────────────
    resizeBtn.addEventListener('click', () => {
      if (modalIndex === null) return;
      const entry = images[modalIndex];
      const newW  = parseInt(resizeWidth.value, 10);
      const newH  = parseInt(resizeHeight.value, 10);
      if (!newW || !newH || newW < 1 || newH < 1) return;

      // Draw onto a canvas at the new size and get a new dataUrl
      const canvas = document.createElement('canvas');
      canvas.width  = newW;
      canvas.height = newH;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, newW, newH);
        const newDataUrl = canvas.toDataURL('image/png');
        entry.dataUrl  = newDataUrl;
        entry.currentW = newW;
        entry.currentH = newH;
        aspectRatio    = newW / newH;

        // Update sidebar thumbnail
        entry.card.querySelector('img').src = newDataUrl;

        // Update main viewer if this is the active image
        if (activeIndex === modalIndex) {
          mainImg.src = newDataUrl;
        }

        resizeBtn.textContent = '✓ Resized';
        setTimeout(() => { resizeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Resize`; }, 1500);
      };
      img.src = entry.dataUrl;
    });
  </script>
</body>
</html>
