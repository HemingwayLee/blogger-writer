<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: #242424;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #aaa;
      text-transform: uppercase;
    }

    #upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #upload-btn:hover { background: #2563eb; }
    #upload-btn svg { flex-shrink: 0; }

    #file-input { display: none; }

    /* ── Image list ── */
    #image-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #image-list::-webkit-scrollbar { width: 5px; }
    #image-list::-webkit-scrollbar-track { background: transparent; }
    #image-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .image-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .image-card:hover { background: #383838; border-color: #555; }
    .image-card.active { border-color: #3b82f6; background: #1e3a5f; }

    .image-card img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      overflow: hidden;
    }
    .card-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ddd;
    }
    .card-size {
      font-size: 11px;
      color: #777;
      margin-top: 2px;
    }

    .card-remove {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .card-remove:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    .empty-state {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 32px 16px;
      line-height: 1.6;
    }
    .empty-state svg { margin-bottom: 10px; opacity: 0.4; }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #141414;
    }

    #main-placeholder {
      text-align: center;
      color: #444;
    }
    #main-placeholder svg { margin-bottom: 16px; opacity: 0.3; }
    #main-placeholder p { font-size: 15px; }

    #main-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #main-label {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #ccc;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Images</h2>
      <button id="upload-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload Images
      </button>
      <input type="file" id="file-input" accept="image/*" multiple />
    </div>

    <div id="image-list">
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>No images yet.<br/>Click Upload to add some.</p>
      </div>
    </div>
  </aside>

  <!-- Main viewer -->
  <main id="main">
    <div id="main-placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>Select an image to preview</p>
    </div>
    <img id="main-img" alt="Preview" />
    <span id="main-label"></span>
  </main>

  <script>
    const uploadBtn   = document.getElementById('upload-btn');
    const fileInput   = document.getElementById('file-input');
    const imageList   = document.getElementById('image-list');
    const emptyState  = document.getElementById('empty-state');
    const mainImg     = document.getElementById('main-img');
    const mainLabel   = document.getElementById('main-label');
    const mainPlaceholder = document.getElementById('main-placeholder');

    let images = [];   // { name, size, dataUrl, card }
    let activeIndex = null;

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      files.forEach(loadFile);
      fileInput.value = '';
    });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const entry = { name: file.name, size: file.size, dataUrl: e.target.result };
        const index = images.length;
        images.push(entry);
        entry.card = createCard(entry, index);
        imageList.appendChild(entry.card);
        emptyState.style.display = 'none';
        // Auto-select first uploaded image
        if (images.length === 1) selectImage(0);
      };
      reader.readAsDataURL(file);
    }

    function createCard(entry, index) {
      const card = document.createElement('div');
      card.className = 'image-card';

      const thumb = document.createElement('img');
      thumb.src = entry.dataUrl;
      thumb.alt = entry.name;

      const info = document.createElement('div');
      info.className = 'card-info';

      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = entry.name;
      name.title = entry.name;

      const size = document.createElement('div');
      size.className = 'card-size';
      size.textContent = formatSize(entry.size);

      info.appendChild(name);
      info.appendChild(size);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'card-remove';
      removeBtn.title = 'Remove';
      removeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

      card.appendChild(thumb);
      card.appendChild(info);
      card.appendChild(removeBtn);

      card.addEventListener('click', (e) => {
        if (e.target.closest('.card-remove')) return;
        selectImage(images.indexOf(entry));
      });

      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeImage(images.indexOf(entry));
      });

      return card;
    }

    function selectImage(index) {
      if (activeIndex !== null && images[activeIndex]) {
        images[activeIndex].card.classList.remove('active');
      }
      activeIndex = index;
      const entry = images[index];
      entry.card.classList.add('active');

      mainImg.src = entry.dataUrl;
      mainImg.style.display = 'block';
      mainLabel.textContent = entry.name;
      mainLabel.style.display = 'block';
      mainPlaceholder.style.display = 'none';
    }

    function removeImage(index) {
      const entry = images[index];
      entry.card.remove();
      images.splice(index, 1);

      if (images.length === 0) {
        emptyState.style.display = '';
        mainImg.style.display = 'none';
        mainLabel.style.display = 'none';
        mainPlaceholder.style.display = '';
        activeIndex = null;
      } else if (activeIndex === index) {
        const next = Math.min(index, images.length - 1);
        activeIndex = null;
        selectImage(next);
      } else if (activeIndex > index) {
        activeIndex--;
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  </script>
</body>
</html>
