<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: #242424;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #aaa;
      text-transform: uppercase;
    }

    #upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #upload-btn:hover { background: #2563eb; }
    #upload-btn svg { flex-shrink: 0; }

    #file-input { display: none; }

    /* ── Image list ── */
    #image-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #image-list::-webkit-scrollbar { width: 5px; }
    #image-list::-webkit-scrollbar-track { background: transparent; }
    #image-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .image-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .image-card:hover { background: #383838; border-color: #555; }
    .image-card.active { border-color: #3b82f6; background: #1e3a5f; }

    .image-card img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      overflow: hidden;
    }
    .card-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ddd;
    }
    .card-size {
      font-size: 11px;
      color: #777;
      margin-top: 2px;
    }

    .card-remove {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .card-remove:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    .empty-state {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 32px 16px;
      line-height: 1.6;
    }
    .empty-state svg { margin-bottom: 10px; opacity: 0.4; }

    /* ── Sidebar footer ── */
    #sidebar-footer {
      padding: 12px;
      border-top: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #publish-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #publish-btn:hover { background: #15803d; }

    #resize-all-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #b45309;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #resize-all-btn:hover { background: #92400e; }
    #resize-all-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #settings-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      color: #888;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #settings-btn:hover { background: #2e2e2e; color: #ccc; border-color: #555; }

    /* ── Settings modal ── */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #settings-overlay.open { display: flex; }

    #settings-modal {
      background: #242424;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      width: 460px;
      max-width: calc(100vw - 48px);
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    #settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #settings-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: #ddd;
    }
    #settings-close {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      transition: color 0.15s;
    }
    #settings-close:hover { color: #ddd; }

    #settings-body {
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #settings-body::-webkit-scrollbar { width: 5px; }
    #settings-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .settings-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }
    .settings-group input,
    .settings-group select {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #ddd;
      font-size: 13px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .settings-group input:focus,
    .settings-group select:focus { border-color: #3b82f6; }
    .settings-group select option { background: #2a2a2a; }

    .settings-group .hint {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    .settings-row {
      display: flex;
      gap: 12px;
    }
    .settings-row .settings-group { flex: 1; }

    .settings-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      padding-bottom: 4px;
      border-bottom: 1px solid #2e2e2e;
    }

    #settings-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px 18px;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }

    .btn-secondary {
      background: transparent;
      color: #888;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-secondary:hover { background: #2e2e2e; color: #ccc; }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #2563eb; }

    #settings-status {
      font-size: 12px;
      color: #555;
      align-self: center;
      margin-right: auto;
    }
    #settings-status.ok  { color: #4ade80; }
    #settings-status.err { color: #f87171; }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #141414;
    }

    #main-placeholder {
      text-align: center;
      color: #444;
    }
    #main-placeholder svg { margin-bottom: 16px; opacity: 0.3; }
    #main-placeholder p { font-size: 15px; }

    #main-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #main-label {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #ccc;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      display: none;
    }

    #main-img { cursor: pointer; }
    #main-img:hover { opacity: 0.9; }

    /* ── Modal overlay ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #242424;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      width: 780px;
      max-width: calc(100vw - 48px);
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #modal-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 380px;
    }
    #modal-close {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    #modal-close:hover { color: #ddd; }

    #modal-body {
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    #modal-body::-webkit-scrollbar { width: 5px; }
    #modal-body::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .modal-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .modal-section-header label { margin-bottom: 0; }

    .modal-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 8px;
    }

    #generate-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    #generate-btn:hover { background: #6d28d9; }
    #generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #modal-generated[readonly] {
      opacity: 0.85;
      cursor: default;
    }

    .modal-section textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #ddd;
      font-size: 16px;
      font-family: inherit;
      padding: 12px 14px;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-section textarea:focus { border-color: #3b82f6; }

    .resize-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .resize-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }
    .resize-field span {
      font-size: 11px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .resize-field input {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #ddd;
      font-size: 13px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .resize-field input:focus { border-color: #3b82f6; }

    .resize-divider {
      color: #555;
      font-size: 18px;
      padding-top: 18px;
      flex-shrink: 0;
    }

    #resize-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-end;
      margin-top: 2px;
    }
    #resize-btn:hover { background: #2563eb; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Images</h2>
      <button id="upload-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload Images
      </button>
      <input type="file" id="file-input" accept="image/*" multiple />
    </div>

    <div id="image-list">
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>No images yet.<br/>Click Upload to add some.</p>
      </div>
    </div>
    <div id="sidebar-footer">
      <button id="resize-all-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
        </svg>
        Resize All
      </button>
      <button id="publish-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9l20-7z"/>
        </svg>
        Publish
      </button>
      <button id="settings-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </button>
    </div>
  </aside>

  <!-- Settings modal -->
  <div id="settings-overlay">
    <div id="settings-modal">
      <div id="settings-header">
        <h3>Ollama Connection</h3>
        <button id="settings-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div id="settings-body">
        <div class="settings-section-title">Server</div>

        <div class="settings-row">
          <div class="settings-group">
            <label>IP / Host</label>
            <input type="text" id="cfg-host" placeholder="127.0.0.1" />
          </div>
          <div class="settings-group" style="max-width:120px">
            <label>Port</label>
            <input type="number" id="cfg-port" placeholder="11434" min="1" max="65535" />
          </div>
        </div>

        <div class="settings-group">
          <label>Protocol</label>
          <select id="cfg-protocol">
            <option value="http">http</option>
            <option value="https">https</option>
          </select>
        </div>

        <div class="settings-section-title" style="margin-top:4px">Model</div>

        <div class="settings-group">
          <label>Model Name</label>
          <input type="text" id="cfg-model" placeholder="gemma3:12b" />
          <div class="hint">e.g. llava, llava:13b, bakllava, moondream</div>
        </div>

        <div class="settings-group">
          <label>Request Timeout (seconds)</label>
          <input type="number" id="cfg-timeout" placeholder="240" min="1" />
        </div>

        <div class="settings-section-title" style="margin-top:4px">Advanced</div>

        <div class="settings-group">
          <label>System Prompt</label>
          <input type="text" id="cfg-system" placeholder="You are a helpful assistant." />
          <div class="hint">Optional system prompt sent with every request.</div>
        </div>

        <div class="settings-row">
          <div class="settings-group">
            <label>Temperature</label>
            <input type="number" id="cfg-temperature" placeholder="0.7" min="0" max="2" step="0.1" />
          </div>
          <div class="settings-group">
            <label>Max Tokens</label>
            <input type="number" id="cfg-max-tokens" placeholder="2048" min="1" />
          </div>
        </div>
      </div>

      <div id="settings-footer">
        <span id="settings-status"></span>
        <button class="btn-secondary" id="settings-test-btn">Test Connection</button>
        <button class="btn-primary" id="settings-save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Main viewer -->
  <main id="main">
    <div id="main-placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>Select an image to preview</p>
    </div>
    <img id="main-img" alt="Preview" />
    <span id="main-label"></span>
  </main>

  <!-- Image detail modal -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="modal-body">
        <!-- Section 1: Description -->
        <div class="modal-section">
          <div class="modal-section-header">
            <label>Description</label>
            <button id="generate-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><path d="M18 2v4h4"/>
              </svg>
              Generate Text
            </button>
          </div>
          <textarea id="modal-description" placeholder="Add a description…"></textarea>
        </div>

        <!-- Section 2: Generated text -->
        <div class="modal-section">
          <label>Generated Text</label>
          <textarea id="modal-generated" placeholder="Generated text will appear here…" readonly></textarea>
        </div>

        <!-- Section 3: Resize -->
        <div class="modal-section">
          <label>Dimensions</label>
          <div class="resize-row">
            <div class="resize-field">
              <span>Width (px)</span>
              <input type="number" id="resize-width" min="1" />
            </div>
            <div class="resize-divider">×</div>
            <div class="resize-field">
              <span>Height (px)</span>
              <input type="number" id="resize-height" min="1" />
            </div>
            <button id="resize-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <path d="M7 10l5 5 5-5"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Resize
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadBtn       = document.getElementById('upload-btn');
    const fileInput       = document.getElementById('file-input');
    const imageList       = document.getElementById('image-list');
    const emptyState      = document.getElementById('empty-state');
    const mainImg         = document.getElementById('main-img');
    const mainLabel       = document.getElementById('main-label');
    const mainPlaceholder = document.getElementById('main-placeholder');

    const modalOverlay    = document.getElementById('modal-overlay');
    const modalTitle      = document.getElementById('modal-title');
    const modalClose      = document.getElementById('modal-close');
    const modalDesc       = document.getElementById('modal-description');
    const modalGenerated  = document.getElementById('modal-generated');
    const resizeWidth     = document.getElementById('resize-width');
    const resizeHeight    = document.getElementById('resize-height');
    const resizeBtn       = document.getElementById('resize-btn');

    let images = [];   // { name, size, dataUrl, card, description, generated }
    let activeIndex = null;
    let modalIndex  = null;
    let aspectRatio = 1;  // width / height
    let changingDim = false;  // guard against recursive input events

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      files.forEach(loadFile);
      fileInput.value = '';
    });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const entry = {
            name: file.name,
            size: file.size,
            dataUrl: e.target.result,
            origW: img.naturalWidth,
            origH: img.naturalHeight,
            currentW: img.naturalWidth,
            currentH: img.naturalHeight,
            description: '',
            generated: ''
          };
          images.push(entry);
          entry.card = createCard(entry);
          imageList.appendChild(entry.card);
          emptyState.style.display = 'none';
          if (images.length === 1) selectImage(0);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function createCard(entry) {
      const card = document.createElement('div');
      card.className = 'image-card';

      const thumb = document.createElement('img');
      thumb.src = entry.dataUrl;
      thumb.alt = entry.name;

      const info = document.createElement('div');
      info.className = 'card-info';

      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = entry.name;
      name.title = entry.name;

      const size = document.createElement('div');
      size.className = 'card-size';
      size.textContent = formatSize(entry.size);

      info.appendChild(name);
      info.appendChild(size);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'card-remove';
      removeBtn.title = 'Remove';
      removeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

      card.appendChild(thumb);
      card.appendChild(info);
      card.appendChild(removeBtn);

      card.addEventListener('click', (e) => {
        if (e.target.closest('.card-remove')) return;
        selectImage(images.indexOf(entry));
      });

      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeImage(images.indexOf(entry));
      });

      return card;
    }

    function selectImage(index) {
      if (activeIndex !== null && images[activeIndex]) {
        images[activeIndex].card.classList.remove('active');
      }
      activeIndex = index;
      const entry = images[index];
      entry.card.classList.add('active');

      mainImg.src = entry.dataUrl;
      mainImg.style.display = 'block';
      mainLabel.textContent = entry.name;
      mainLabel.style.display = 'block';
      mainPlaceholder.style.display = 'none';
    }

    function removeImage(index) {
      const entry = images[index];
      entry.card.remove();
      images.splice(index, 1);

      if (images.length === 0) {
        emptyState.style.display = '';
        mainImg.style.display = 'none';
        mainLabel.style.display = 'none';
        mainPlaceholder.style.display = '';
        activeIndex = null;
      } else if (activeIndex === index) {
        const next = Math.min(index, images.length - 1);
        activeIndex = null;
        selectImage(next);
      } else if (activeIndex > index) {
        activeIndex--;
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ── Settings ───────────────────────────────────────────
    const settingsBtn     = document.getElementById('settings-btn');
    const settingsOverlay = document.getElementById('settings-overlay');
    const settingsClose   = document.getElementById('settings-close');
    const settingsSaveBtn = document.getElementById('settings-save-btn');
    const settingsTestBtn = document.getElementById('settings-test-btn');
    const settingsStatus  = document.getElementById('settings-status');

    const SETTINGS_KEY = 'ollama_settings';
    const SETTINGS_DEFAULTS = {
      host: '127.0.0.1',
      port: '11434',
      protocol: 'http',
      model: 'gemma3:12b',
      timeout: '240',
      system: '',
      temperature: '0.7',
      maxTokens: '2048',
    };

    let ollamaSettings = { ...SETTINGS_DEFAULTS };

    function loadSettings() {
      try {
        const saved = localStorage.getItem(SETTINGS_KEY);
        if (saved) ollamaSettings = { ...SETTINGS_DEFAULTS, ...JSON.parse(saved) };
      } catch (_) {}
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(ollamaSettings));
    }

    function populateSettingsForm() {
      document.getElementById('cfg-host').value        = ollamaSettings.host;
      document.getElementById('cfg-port').value        = ollamaSettings.port;
      document.getElementById('cfg-protocol').value    = ollamaSettings.protocol;
      document.getElementById('cfg-model').value       = ollamaSettings.model;
      document.getElementById('cfg-timeout').value     = ollamaSettings.timeout;
      document.getElementById('cfg-system').value      = ollamaSettings.system;
      document.getElementById('cfg-temperature').value = ollamaSettings.temperature;
      document.getElementById('cfg-max-tokens').value  = ollamaSettings.maxTokens;
    }

    function readSettingsForm() {
      ollamaSettings.host        = document.getElementById('cfg-host').value.trim()        || SETTINGS_DEFAULTS.host;
      ollamaSettings.port        = document.getElementById('cfg-port').value.trim()        || SETTINGS_DEFAULTS.port;
      ollamaSettings.protocol    = document.getElementById('cfg-protocol').value           || SETTINGS_DEFAULTS.protocol;
      ollamaSettings.model       = document.getElementById('cfg-model').value.trim()       || SETTINGS_DEFAULTS.model;
      ollamaSettings.timeout     = document.getElementById('cfg-timeout').value.trim()     || SETTINGS_DEFAULTS.timeout;
      ollamaSettings.system      = document.getElementById('cfg-system').value.trim();
      ollamaSettings.temperature = document.getElementById('cfg-temperature').value.trim() || SETTINGS_DEFAULTS.temperature;
      ollamaSettings.maxTokens   = document.getElementById('cfg-max-tokens').value.trim() || SETTINGS_DEFAULTS.maxTokens;
    }

    settingsBtn.addEventListener('click', () => {
      settingsStatus.textContent = '';
      settingsStatus.className = '';
      populateSettingsForm();
      settingsOverlay.classList.add('open');
    });

    function closeSettings() { settingsOverlay.classList.remove('open'); }
    settingsClose.addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) closeSettings(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSettings(); });

    settingsSaveBtn.addEventListener('click', () => {
      readSettingsForm();
      saveSettings();
      settingsStatus.textContent = 'Saved.';
      settingsStatus.className = 'ok';
      setTimeout(() => { settingsStatus.textContent = ''; settingsStatus.className = ''; }, 2000);
    });

    settingsTestBtn.addEventListener('click', async () => {
      readSettingsForm();
      settingsStatus.textContent = 'Testing…';
      settingsStatus.className = '';
      const url = `${ollamaSettings.protocol}://${ollamaSettings.host}:${ollamaSettings.port}/api/tags`;
      try {
        const ctrl = new AbortController();
        const tid   = setTimeout(() => ctrl.abort(), 5000);
        const res   = await fetch(url, { signal: ctrl.signal });
        clearTimeout(tid);
        if (res.ok) {
          settingsStatus.textContent = 'Connected!';
          settingsStatus.className = 'ok';
        } else {
          settingsStatus.textContent = `Error ${res.status}`;
          settingsStatus.className = 'err';
        }
      } catch (err) {
        settingsStatus.textContent = err.name === 'AbortError' ? 'Timed out' : 'Unreachable';
        settingsStatus.className = 'err';
      }
    });

    loadSettings();

    // ── Resize All ─────────────────────────────────────────
    const resizeAllBtn = document.getElementById('resize-all-btn');
    const RESIZE_ALL_WIDTH = 810;

    resizeAllBtn.addEventListener('click', () => {
      if (images.length === 0) return;
      resizeAllBtn.disabled = true;

      let done = 0;
      images.forEach((entry, idx) => {
        const newW = RESIZE_ALL_WIDTH;
        const newH = Math.round(newW * (entry.currentH / entry.currentW));

        const canvas = document.createElement('canvas');
        canvas.width  = newW;
        canvas.height = newH;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0, newW, newH);
          const newDataUrl = canvas.toDataURL('image/png');
          entry.dataUrl  = newDataUrl;
          entry.currentW = newW;
          entry.currentH = newH;

          // Update sidebar thumbnail
          entry.card.querySelector('img').src = newDataUrl;

          // Update main viewer if this is the active image
          if (activeIndex === idx) mainImg.src = newDataUrl;

          // Update modal if open on this image
          if (modalIndex === idx) {
            resizeWidth.value  = newW;
            resizeHeight.value = newH;
            aspectRatio = newW / newH;
          }

          done++;
          if (done === images.length) {
            resizeAllBtn.textContent = `✓ All resized to ${RESIZE_ALL_WIDTH}px`;
            setTimeout(() => {
              resizeAllBtn.disabled = false;
              resizeAllBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg> Resize All`;
            }, 2000);
          }
        };
        img.src = entry.dataUrl;
      });
    });

    // ── Modal ──────────────────────────────────────────────
    mainImg.addEventListener('click', () => {
      if (activeIndex === null) return;
      openModal(activeIndex);
    });

    function openModal(index) {
      modalIndex = index;
      const entry = images[index];
      modalTitle.textContent = entry.name;
      modalDesc.value      = entry.description;
      modalGenerated.value = entry.generated;
      resizeWidth.value    = entry.currentW;
      resizeHeight.value   = entry.currentH;
      aspectRatio = entry.currentW / entry.currentH;
      modalOverlay.classList.add('open');
    }

    function closeModal() {
      if (modalIndex !== null) {
        // Persist textarea values back to the entry
        images[modalIndex].description = modalDesc.value;
        images[modalIndex].generated   = modalGenerated.value;
      }
      modalIndex = null;
      modalOverlay.classList.remove('open');
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ── Linked dimension inputs ────────────────────────────
    resizeWidth.addEventListener('input', () => {
      if (changingDim) return;
      changingDim = true;
      const w = parseFloat(resizeWidth.value);
      if (w > 0) resizeHeight.value = Math.round(w / aspectRatio);
      changingDim = false;
    });

    resizeHeight.addEventListener('input', () => {
      if (changingDim) return;
      changingDim = true;
      const h = parseFloat(resizeHeight.value);
      if (h > 0) resizeWidth.value = Math.round(h * aspectRatio);
      changingDim = false;
    });

    // ── Resize action ──────────────────────────────────────
    resizeBtn.addEventListener('click', () => {
      if (modalIndex === null) return;
      const entry = images[modalIndex];
      const newW  = parseInt(resizeWidth.value, 10);
      const newH  = parseInt(resizeHeight.value, 10);
      if (!newW || !newH || newW < 1 || newH < 1) return;

      // Draw onto a canvas at the new size and get a new dataUrl
      const canvas = document.createElement('canvas');
      canvas.width  = newW;
      canvas.height = newH;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, newW, newH);
        const newDataUrl = canvas.toDataURL('image/png');
        entry.dataUrl  = newDataUrl;
        entry.currentW = newW;
        entry.currentH = newH;
        aspectRatio    = newW / newH;

        // Update sidebar thumbnail
        entry.card.querySelector('img').src = newDataUrl;

        // Update main viewer if this is the active image
        if (activeIndex === modalIndex) {
          mainImg.src = newDataUrl;
        }

        resizeBtn.textContent = '✓ Resized';
        setTimeout(() => { resizeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Resize`; }, 1500);
      };
      img.src = entry.dataUrl;
    });

    // ── Generate Text ──────────────────────────────────────
    const generateBtn = document.getElementById('generate-btn');

    generateBtn.addEventListener('click', async () => {
      if (modalIndex === null) return;
      const entry       = images[modalIndex];
      const userHint    = modalDesc.value.trim();
      const hintClause  = userHint ? `\n使用者補充說明：「${userHint}」` : '';
      const prompt =
`請仔細觀察這張圖片，並以繁體中文撰寫一段約 150 至 200 字的生動描述。請依照以下結構組織內容：
1. 描述圖片中的主體、場景、色彩與值得注意的細節。
2. 描述這張圖片所傳達的氛圍或情感。
3. 若圖片中含有食物或飲品，請描述其可能的味道、香氣與口感，包括質地、風味、溫度等感官細節。${hintClause}

請以流暢的散文書寫（不使用條列式或標題），並確保全文以繁體中文呈現，字數控制在 150 至 200 字之間。`;

      // Strip the data URL prefix to get raw base64
      const base64 = entry.dataUrl.split(',')[1];

      const { protocol, host, port, model } = ollamaSettings;
      const url = `${protocol}://${host}:${port}/api/generate`;

      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating…';
      modalGenerated.value = '';

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model,
            prompt,
            images: [base64],
            stream: false,
          }),
        });

        if (!res.ok) {
          const err = await res.text();
          modalGenerated.value = `Error ${res.status}: ${err}`;
        } else {
          const data = await res.json();
          modalGenerated.value = data.response ?? JSON.stringify(data);
          images[modalIndex].generated = modalGenerated.value;
        }
      } catch (err) {
        modalGenerated.value = `Failed to reach Ollama: ${err.message}\n\nCheck your connection settings.`;
      } finally {
        generateBtn.disabled = false;
        generateBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><path d="M18 2v4h4"/></svg> Generate Text`;
      }
    });
  </script>
</body>
</html>
